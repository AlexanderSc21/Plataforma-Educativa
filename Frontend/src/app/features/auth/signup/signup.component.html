<main class="signup-page">
  <div class="page-container">
    <app-navbar></app-navbar>

    <section class="auth-hero" aria-labelledby="signup-title">
      <article class="signup-card">
      <header class="signup-header">
        <h1 id="signup-title">Crea tu cuenta</h1>
        <p>Empieza a aprender y organiza tu progreso desde hoy.</p>
      </header>

      <form class="signup-form" [formGroup]="signupForm" novalidate (ngSubmit)="onSubmit()">
        

        <app-input
          id="email"
          label="Correo electronico"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="ejemplo@correo.com"
          [required]="true"
          [invalid]="signupForm.controls.email.invalid && signupForm.controls.email.touched"
          errorText="Ingresa un correo valido."
        ></app-input>

        <app-input
          id="password"
          label="Contrasena"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="Minimo 8 caracteres"
          [required]="true"
          [invalid]="signupForm.controls.password.invalid && signupForm.controls.password.touched"
          errorText="Debe tener al menos 8 caracteres."
        ></app-input>

        <app-input
          id="confirmPassword"
          label="Confirmar contrasena"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Repite tu contrasena"
          [required]="true"
          [invalid]="signupForm.controls.confirmPassword.invalid && signupForm.controls.confirmPassword.touched"
          errorText="Confirma tu contrasena."
        ></app-input>

        <label class="terms-option" for="terms">
          <input id="terms" type="checkbox" formControlName="terms" required />
          <span>Acepto terminos y politica de privacidad.</span>
        </label>

        <app-button type="submit" [fullWidth]="true">Crear cuenta</app-button>
      </form>

      <p class="divider">O registrarte con</p>

      <div class="social-btns">
        <app-button type="button" variant="secondary">
          <span aria-hidden="true">G</span>
          Google
        </app-button>
        <app-button type="button" variant="secondary">
          <span aria-hidden="true">GH</span>
          GitHub
        </app-button>
      </div>

      <footer class="signup-footer">
        Ya tienes cuenta?
        <a routerLink="/auth/login">Inicia sesion</a>
      </footer>
      </article>
    </section>
  </div>
</main>
