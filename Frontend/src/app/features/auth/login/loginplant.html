<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Aula Nexo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5c3cfc;
            --primary-dark: #4a2fd4;
            --text-dark: #1c1d1f;
            --text-light: #6a6f73;
            --bg-light: #f7f9fa;
            --white: #ffffff;
            --border: #d1d7dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR SIMPLIFICADA PARA LOGIN --- */
        .navbar {
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--bg-light);
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 3px;
        }

        /* --- CONTENEDOR DE LOGIN --- */
        .login-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            background: var(--white);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 14px;
        }

        /* --- FORMULARIO --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(92, 60, 252, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .options a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: var(--primary-dark);
        }

        /* --- SOCIAL LOGIN --- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-light);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--bg-light);
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .social-btns {
            display: flex;
            gap: 10px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-social:hover {
            background-color: var(--bg-light);
        }

        /* --- FOOTER LOGIN --- */
        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-light);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-card {
                padding: 20px 10px;
            }
            .social-btns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">
            <div class="logo-dot"></div>
            Aula Nexo
        </a>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>¡Hola de nuevo!</h1>
                <p>Ingresa a tu cuenta para continuar aprendiendo.</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="options">
                    <label style="display: flex; align-items: center; gap: 5px; color: var(--text-light);">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="divider">O continuar con</div>

            <div class="social-btns">
                <button class="btn-social">
                    <img src="https://www.google.com/favicon.ico" width="16" alt="Google"> Google
                </button>
                <button class="btn-social">
                    <img src="https://github.com/favicon.ico" width="16" alt="GitHub"> GitHub
                </button>
            </div>

            <div class="login-footer">
                ¿No tienes una cuenta? <a href="#">Regístrate gratis</a>
            </div>
        </div>
    </main>

</body>
</html>
