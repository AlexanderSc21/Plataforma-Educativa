<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Aula Nexo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5c3cfc;
            --text-dark: #1c1d1f;
            --text-light: #6a6f73;
            --bg-body: #f7f9fa;
            --white: #ffffff;
            --border: #eef0f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
        }

        /* --- NAVBAR RESPONSIVE --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5%;
            background: var(--white);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 3px;
        }

        /* Menu Hamburguesa Hack */
        #menu-toggle { display: none; }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }
        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--text-dark);
            border-radius: 2px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            background: var(--text-dark);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* --- HEADER --- */
        .profile-header {
            background: var(--text-dark);
            color: var(--white);
            padding: 50px 5%;
        }

        .welcome-box h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        /* --- CONTENIDO --- */
        .container {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }

        /* --- GRID CURSOS --- */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.3s;
        }

        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .course-img {
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 800;
        }

        .course-info { padding: 20px; }
        .course-info h3 { font-size: 16px; margin-bottom: 10px; height: 45px; overflow: hidden; }

        .progress-bar {
            height: 6px;
            background: var(--bg-body);
            border-radius: 10px;
            margin: 15px 0 5px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
        }

        .progress-text { font-size: 12px; font-weight: 700; color: var(--primary); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .hamburger { display: flex; order: 1; }
            .logo { order: 2; }
            .user-profile-nav { order: 3; }

            .nav-links {
                position: absolute;
                top: 60px;
                left: -100%;
                flex-direction: column;
                background: var(--white);
                width: 100%;
                height: auto;
                padding: 20px 5%;
                transition: 0.4s;
                box-shadow: 0 10px 10px rgba(0,0,0,0.05);
            }

            #menu-toggle:checked ~ .nav-links { left: 0; }

            .profile-header { text-align: center; padding: 40px 20px; }
            .welcome-box h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <a href="#" class="logo">
            <div class="logo-dot"></div>
            Aula Nexo
        </a>

        <div class="nav-links">
            <a href="#">Explorar</a>
            <a href="#">Mi Aprendizaje</a>
            <a href="#">Certificaciones</a>
            <a href="#">Soporte</a>
        </div>

        <div class="user-profile-nav">
            <div class="avatar-circle">LP</div>
        </div>
    </nav>

    <header class="profile-header">
        <div class="welcome-box">
            <h1>Bienvenido, Leandro</h1>
            <p style="opacity: 0.7; font-size: 14px;">Continúa donde lo dejaste hoy.</p>
        </div>
    </header>

    <main class="container">
        <div class="section-title">En curso</div>

        <div class="course-grid">
            <div class="course-card">
                <div class="course-img" style="background: linear-gradient(45deg, #f093fb, #f5576c);">JS</div>
                <div class="course-info">
                    <h3>JavaScript Moderno: Master en frameworks</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 65%;"></div>
                    </div>
                    <span class="progress-text">65% completado</span>
                </div>
            </div>

            <div class="course-card">
                <div class="course-img" style="background: linear-gradient(45deg, #5c3cfc, #00d2ff);">TS</div>
                <div class="course-info">
                    <h3>TypeScript para expertos</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 20%;"></div>
                    </div>
                    <span class="progress-text">20% completado</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
