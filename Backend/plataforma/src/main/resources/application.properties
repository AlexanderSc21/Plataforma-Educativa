°Perfecto! Vamos a tiro fijo. Para que el H2 levante sin errores, sin bloqueos de seguridad y con las tablas que ya vimos que Hibernate est· creando, usa esta configuraciÛn exacta en tu src/main/resources/application.properties.

Borra todo lo relacionado a base de datos que tengas y pega esto:

Properties
# ==========================================
# CONFIGURACI”N DE BASE DE DATOS (H2)
# ==========================================
# ConexiÛn en memoria (se crea al arrancar, se borra al cerrar)
spring.datasource.url=jdbc:h2:~/test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# CONFIGURACI”N DE LA CONSOLA H2
# ==========================================
# Habilita la interfaz web en /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Permite que se vea la consola desde cualquier IP (˙til para evitar bloqueos)
spring.h2.console.settings.web-allow-others=true

# ==========================================
# JPA / HIBERNATE
# ==========================================
# Indica a Hibernate que use el dialecto de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Crea las tablas autom·ticamente basadas en tus @Entity
spring.jpa.hibernate.ddl-auto=update

# Muestra los queries SQL en la consola de IntelliJ
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
